<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@2--;500&display=swap');

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            color: var(--tg-theme-text-color);
            background: var(--tg-theme-bg-color);
        }

        #main{
            width: 100%;
            padding: 20px;
            text-align: center;
        }

        h1{
            margin-top: 50px;
            margin-bottom: 10px;
        }
        img{
            width: 70px;
            margin: 30px auto;
        }
        p{
            width: 350px;
            margin: 0 auto;
        }
        button{
            border: 0;
            border-radius: 5px;
            margin-top: 50px;
            height: 60px;
            width: 200px;
            font-size: 20px;
            transition: 0.5s all;
        }
        button:hover{
            background-color: rgb(18, 26, 0);
        }

        #form{
            display: none;
            text-align: center;
        }
        input{
            width: 90%;
            outline: none;
            margin: 10px 5px;
            padding: 15px 10px;
            font-size: 14px;
            border: 2px solid silver;
            border-radius: 5px;
        }
        input:focus{
            border-color: #db5d5d
        }
    </style>
</head>
<body>
    <div id="main">
        <h1>Онлайн магазин</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/3595/3595455.png">
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. A aut eius quas, quisquam consectetur nihil sapiente mollitia similique.</p>
        <button id="buy">Купить</button>
    </div>
    <form id="form">
        <h1>Оформление покупки</h1>
        <input type="text" placeholder="Имя" id="user_name">
        <input type="text" placeholder="Email" id="user_email">
        <input type="text" placeholder="Телефон" id="user_phone">
        <div id="error"></div>
        <button id="order">Оформить</button>  
    </form>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        let tg = window.Telegram.WebApp;
        let buy = document.getElementById("buy");
        let order = document.getElementById("order");
        tg.expend();

        buy.addEventListener("click", () => {
            document.getElementById("main").style.display="none";
            document.getElementById("form").style.display="block";
            document.getElementById("user_name").value = tg.initDataUnsafe.user.first_name + " " + tg.initDataUnsafe.user.last_name;/* Получение полного имени */ 
        })

        order.addEventListener("click", () => {
            document.getElementById("error").innerText = "";
            let name = document.getElementById("user_name").value;
            let email = document.getElementById("user_email").value;
            let phone = document.getElementById("user_phone").value;
            
            if(name.lenght < 5){
                document.getElementById("error").innerText = 'Ошибка в имени';
                return;
            }
            if(email.lenght < 5){
                document.getElementById("error").innerText = 'Ошибка в email';
                return;
            }
            if(phone.lenght < 5){
                document.getElementById("error").innerText = 'Ошибка в номере телефона';
                return;
            }
            
            let data = {
                name: name,
                email: email,
                phone: phone
            };
            tg.sendData(JSON.stringify(data));

            tg.close();
        })

    </script>

</body>
</html>
